services:
  db:
    image: postgres:16-alpine
    container_name: movieverse_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-movieverse}
      POSTGRES_USER: ${POSTGRES_USER:-movieverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-movieverse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-movieverse} -d ${POSTGRES_DB:-movieverse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movieverse_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-movieverse}:${POSTGRES_PASSWORD:-movieverse}@db:5432/${POSTGRES_DB:-movieverse}}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
