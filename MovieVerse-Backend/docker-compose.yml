services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: movieverse
      POSTGRES_USER: movieverse
      POSTGRES_PASSWORD: movieverse
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U movieverse']
      interval: 5s
      timeout: 5s
      retries: 5

  ai:
    build: ../MovieverseAI/server
    environment:
      PORT: 5001
      MODEL_DIR: /model
    volumes:
      - ../MovieverseAI/model:/model:ro
    ports:
      - '5001:5001'

  backend:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://movieverse:movieverse@db:5432/movieverse?schema=public
      AI_SERVICE_URL: http://ai:5001
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080'

volumes:
  pgdata:
