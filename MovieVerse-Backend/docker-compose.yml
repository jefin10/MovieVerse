services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: movieverse
      POSTGRES_USER: movieverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-movieverse}
    # Bind to loopback only: reachable from the host for local dev, but never
    # from the network/internet (don't expose Postgres publicly in production).
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U movieverse']
      interval: 5s
      timeout: 5s
      retries: 5

  ai:
    build: ../MovieverseAI/server
    environment:
      PORT: 5001
      MODEL_DIR: /model
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-}
    volumes:
      - ../MovieverseAI/model:/model:ro
    # Loopback-only: the backend reaches it over the compose network (http://ai:5001);
    # the host mapping is just for local debugging, never public.
    ports:
      - '127.0.0.1:5001:5001'
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://movieverse:${POSTGRES_PASSWORD:-movieverse}@db:5432/movieverse?schema=public
      AI_SERVICE_URL: http://ai:5001
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    ports:
      - '8080:8080'

volumes:
  pgdata:
